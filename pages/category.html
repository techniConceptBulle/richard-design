<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Catégorie | Richard La Literie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components.css" />
  </head>
  <body class="page" data-page="category">
    <header id="site-header"></header>
    <main class="rd-page category-archive-page">
      <div class="category-page-shell layout-wide">
        <nav class="breadcrumb category-archive-breadcrumb" aria-label="Fil d'Ariane">
          <a href="/">Accueil</a>
          <span class="breadcrumb__separator" aria-hidden="true">›</span>
          <span id="category-breadcrumb-current" class="breadcrumb__current">Catégorie</span>
        </nav>

        <header class="category-archive-header">
          <h1 id="category-title">Nom de la catégorie</h1>
          <p id="category-description" class="category-archive-description"></p>
        </header>

        <div class="category-archive-controls">
          <section class="category-archive-filters-panel" aria-label="Filtres produits">
            <div id="category-filters" class="category-filters"></div>
            <div id="category-active-filters" class="category-active-filters" hidden></div>
          </section>

          <div class="category-archive-sort-row">
            <div id="category-sort-controls" class="category-sort-controls"></div>
            <button type="button" id="category-clear-filters" class="category-clear-filters-link">
              Effacer les filtres
            </button>
          </div>
        </div>

        <section class="category-products-section category-archive-products">
          <div id="category-products-grid" class="category-products-grid"></div>
        </section>
      </div>
    </main>
    <footer id="site-footer"></footer>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
