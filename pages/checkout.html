<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Checkout | Richard Design</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/components.css" />
  </head>
  <body class="page" data-page="checkout">
    <header id="site-header"></header>
    <main class="page-main layout-main">
      <div class="container">
        <header class="section-header">
          <div class="section-header-title">
            <p class="section-kicker">Commande</p>
            <h1>Finaliser votre commande</h1>
          </div>
          <p class="section-description">
            Renseignez vos coordonnées, choisissez votre mode de livraison et confirmez
            votre demande dans un parcours clair, rassurant et fluide.
          </p>
        </header>
        <div id="checkout-layout" class="checkout-layout">
          <section id="checkout-form" class="checkout-form card"></section>
          <aside id="checkout-summary" class="checkout-summary card"></aside>
        </div>
      </div>
    </main>
    <footer id="site-footer"></footer>
    <script type="module" src="/js/app.js"></script>
  </body>
  </html>
